<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --border: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8892a0;
  --accent: #e94560;
  --accent-dim: #c73e54;
  --success: #4ecca3;
  --warning: #f5a623;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem;
}
.header {
  max-width: 1200px; margin: 0 auto 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.header h1 { font-size: 1.5rem; font-weight: 600; }
.header .back { font-size: 0.8rem; color: var(--accent); text-decoration: none; }
.header .back:hover { text-decoration: underline; }
.top-grid {
  max-width: 1200px; margin: 0 auto 1.5rem;
  display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem;
}
.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 1.25rem;
}
.panel-label {
  font-size: 0.75rem; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem;
}
.doc-panel textarea {
  width: 100%; min-height: 300px; resize: vertical;
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem;
  line-height: 1.6; padding: 1rem; border-radius: 4px;
}
.doc-panel textarea:focus { outline: none; border-color: var(--accent); }
.doc-panel textarea::placeholder { color: var(--text-dim); }
.file-upload { margin-top: 0.75rem; display: flex; align-items: center; gap: 0.75rem; }
.file-upload input[type="file"] { display: none; }
.file-upload label {
  font-size: 0.8rem; color: var(--accent); cursor: pointer;
  padding: 0.3rem 0.75rem; border: 1px solid var(--border); border-radius: 4px;
}
.file-upload label:hover { border-color: var(--accent); }
.file-name { font-size: 0.75rem; color: var(--text-dim); font-style: italic; }
.controls-panel { display: flex; flex-direction: column; gap: 1.25rem; }
.review-type select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: inherit; font-size: 0.85rem;
  padding: 0.5rem; border-radius: 4px;
}
.review-type select:focus { outline: none; border-color: var(--accent); }
.review-desc { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.4rem; line-height: 1.4; }
.vendor-group { margin-bottom: 0.75rem; }
.vendor-name {
  font-size: 0.7rem; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.25rem;
}
.model-cb {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.2rem 0; font-size: 0.8rem; cursor: pointer;
}
.model-cb input { accent-color: var(--accent); }
.go-btn {
  width: 100%; padding: 0.75rem; background: var(--accent); color: white;
  border: none; border-radius: 6px; font-family: inherit;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  letter-spacing: 0.02em; transition: background 0.15s;
}
.go-btn:hover { background: var(--accent-dim); }
.go-btn:disabled { background: var(--border); cursor: not-allowed; color: var(--text-dim); }
.progress { font-size: 0.8rem; color: var(--warning); text-align: center; min-height: 1.2em; }
.init-error {
  font-size: 0.85rem; color: var(--accent); text-align: center;
  padding: 2rem; max-width: 1200px; margin: 0 auto;
}
.results-area { max-width: 1200px; margin: 0 auto; display: grid; gap: 1.5rem; }
.result-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.result-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
  background: rgba(15, 52, 96, 0.3);
}
.result-model { font-weight: 600; font-size: 0.95rem; }
.result-meta { font-size: 0.72rem; color: var(--text-dim); }
.result-status { font-size: 0.75rem; font-weight: 500; padding: 0.2rem 0.6rem; border-radius: 3px; }
.result-status.waiting { color: var(--text-dim); }
.result-status.complete { color: var(--success); }
.result-status.error { color: var(--accent); }
.result-body {
  padding: 1.25rem; font-size: 0.9rem; line-height: 1.7;
  max-height: 600px; overflow-y: auto;
}
.result-body h1,.result-body h2,.result-body h3 {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  margin: 1rem 0 0.5rem; color: var(--text);
}
.result-body h1 { font-size: 1.2rem; }
.result-body h2 { font-size: 1.05rem; }
.result-body h3 { font-size: 0.95rem; }
.result-body p { margin-bottom: 0.75rem; color: var(--text); }
.result-body ul,.result-body ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
.result-body li { margin-bottom: 0.3rem; }
.result-body blockquote {
  border-left: 3px solid var(--accent); padding: 0.5rem 1rem; margin: 0.75rem 0;
  color: var(--text-dim); background: rgba(15, 52, 96, 0.2); border-radius: 0 4px 4px 0;
}
.result-body code {
  font-family: 'IBM Plex Mono', monospace; background: var(--bg);
  padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.82rem;
}
.result-body strong { color: var(--warning); }
.result-actions {
  padding: 0.5rem 1.25rem 0.75rem; border-top: 1px solid var(--border);
  display: flex; gap: 0.75rem;
}
.copy-btn {
  font-family: inherit; font-size: 0.75rem; color: var(--accent);
  background: none; border: 1px solid var(--border);
  padding: 0.3rem 0.75rem; border-radius: 4px; cursor: pointer;
}
.copy-btn:hover { border-color: var(--accent); }
.combined-bar { max-width: 1200px; margin: 1.5rem auto 0; text-align: right; }
.combined-bar .copy-btn { font-size: 0.85rem; padding: 0.5rem 1rem; }
@media (max-width: 768px) {
  body { padding: 1rem; }
  .top-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="header">
  <a href="/" class="back">&larr; Experiments</a>
  <h1>Review Harness</h1>
</div>
<div class="top-grid">
  <div class="panel doc-panel">
    <div class="panel-label">Document</div>
    <textarea id="docInput" placeholder="Paste document text here..."></textarea>
    <div class="file-upload">
      <label for="fileInput">Load files</label>
      <input type="file" id="fileInput" multiple accept=".md,.txt,.html,.htm,.pdf,.py,.js,.ts,.jsx,.tsx,.css,.json,.yaml,.yml,.toml,.sh,.sql,.java,.go,.rs,.rb,.c,.h,.cpp">
      <span class="file-name" id="fileName"></span>
    </div>
  </div>
  <div class="panel controls-panel">
    <div class="review-type">
      <div class="panel-label">Review Type</div>
      <select id="reviewType"></select>
      <div class="review-desc" id="reviewDesc"></div>
    </div>
    <div>
      <div class="panel-label">Models</div>
      <div id="modelList"></div>
    </div>
    <button class="go-btn" id="goBtn" disabled>Send for Review</button>
    <div class="progress" id="progress"></div>
  </div>
</div>
<div class="results-area" id="results"></div>
<div class="combined-bar" id="combinedBar" style="display:none;">
  <button class="copy-btn" onclick="copyCombined()">Copy All (Markdown)</button>
</div>
<script>
let reviewTypes = [];
let models = [];
let resultData = {};

/** Sanitize model ID for safe use as a DOM id attribute. */
function domId(modelId) {
  return modelId.replace(/[^a-zA-Z0-9_-]/g, '_');
}

async function init() {
  let typesResp, modelsResp;
  try {
    [typesResp, modelsResp] = await Promise.all([
      fetch('/api/review/types').then(r => {
        if (!r.ok) throw new Error(`Review types: HTTP ${r.status}`);
        return r.json();
      }),
      fetch('/api/models').then(r => {
        if (!r.ok) throw new Error(`Models: HTTP ${r.status}`);
        return r.json();
      }),
    ]);
  } catch (e) {
    document.getElementById('results').innerHTML =
      `<div class="init-error">Could not connect to server: ${e.message}</div>`;
    return;
  }

  reviewTypes = typesResp.types;
  const byVendor = modelsResp.vendors;
  for (const [vendor, vendorModels] of Object.entries(byVendor)) {
    vendorModels.forEach(m => models.push({ vendor, ...m }));
  }

  const sel = document.getElementById('reviewType');
  reviewTypes.forEach(rt => {
    const opt = document.createElement('option');
    opt.value = rt.id;
    opt.textContent = rt.label;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', updateDesc);
  updateDesc();

  const list = document.getElementById('modelList');
  for (const [vendor, vendorModels] of Object.entries(byVendor)) {
    const group = document.createElement('div');
    group.className = 'vendor-group';
    group.innerHTML = `<div class="vendor-name">${vendor}</div>`;
    vendorModels.forEach(m => {
      const label = document.createElement('label');
      label.className = 'model-cb';
      label.innerHTML = `<input type="checkbox" value="${m.id}"> ${m.label}`;
      label.querySelector('input').addEventListener('change', updateGoBtn);
      group.appendChild(label);
    });
    list.appendChild(group);
  }
}

function updateDesc() {
  const sel = document.getElementById('reviewType');
  const rt = reviewTypes.find(t => t.id === sel.value);
  document.getElementById('reviewDesc').textContent = rt ? rt.description : '';
}

function updateGoBtn() {
  const hasDoc = document.getElementById('docInput').value.trim().length > 0;
  const hasModels = getSelectedModels().length > 0;
  document.getElementById('goBtn').disabled = !(hasDoc && hasModels);
}

function getSelectedModels() {
  return [...document.querySelectorAll('#modelList input:checked')].map(cb => cb.value);
}

document.addEventListener('DOMContentLoaded', () => {
  init();
  document.getElementById('docInput').addEventListener('input', updateGoBtn);
  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const files = [...e.target.files];
    if (!files.length) return;
    const nameEl = document.getElementById('fileName');
    const single = files.length === 1;
    nameEl.textContent = single ? `Uploading ${files[0].name}...` : `Uploading ${files.length} files...`;
    nameEl.style.color = 'var(--warning)';

    try {
      const results = [];
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if (!single) nameEl.textContent = `Extracting ${i + 1} / ${files.length}: ${file.name}`;
        const form = new FormData();
        form.append('file', file);
        const resp = await fetch('/api/review/extract', { method: 'POST', body: form });
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(`${file.name}: ${err.detail || 'extraction failed'}`);
        }
        const data = await resp.json();
        results.push({ filename: data.filename, text: data.text });
      }

      let combined;
      if (results.length === 1) {
        combined = results[0].text;
      } else {
        combined = results.map(r =>
          `### ${r.filename}\n\n${r.text}`
        ).join('\n\n---\n\n');
      }

      document.getElementById('docInput').value = combined;
      const totalKb = (combined.length / 1024).toFixed(0);
      nameEl.textContent = single
        ? `${results[0].filename} (${totalKb} KB)`
        : `${results.length} files loaded (${totalKb} KB total)`;
      nameEl.style.color = 'var(--success)';
      updateGoBtn();
    } catch (err) {
      nameEl.textContent = `Error: ${err.message}`;
      nameEl.style.color = 'var(--accent)';
    }
  });
  document.getElementById('goBtn').addEventListener('click', startReview);
});

async function startReview() {
  const doc = document.getElementById('docInput').value.trim();
  const modelIds = getSelectedModels();
  const reviewTypeId = document.getElementById('reviewType').value;
  document.getElementById('goBtn').disabled = true;
  document.getElementById('progress').textContent = `Sending to ${modelIds.length} model(s)...`;
  document.getElementById('combinedBar').style.display = 'none';
  resultData = {};

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';
  modelIds.forEach(id => {
    const safe = domId(id);
    const label = models.find(m => m.id === id)?.label || id;
    const card = document.createElement('div');
    card.className = 'result-card';
    card.id = `result-${safe}`;
    card.innerHTML = `
      <div class="result-header">
        <div>
          <span class="result-model">${label}</span>
          <span class="result-meta" id="meta-${safe}"></span>
        </div>
        <span class="result-status waiting" id="status-${safe}">Waiting...</span>
      </div>
      <div class="result-body" id="body-${safe}"></div>
      <div class="result-actions">
        <button class="copy-btn" data-model-id="${id}">Copy Markdown</button>
      </div>
    `;
    card.querySelector('.copy-btn').addEventListener('click', () => copyOne(id));
    resultsEl.appendChild(card);
  });

  const resp = await fetch('/api/review/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ document: doc, model_ids: modelIds, review_type_id: reviewTypeId }),
  });
  if (!resp.ok) {
    const err = await resp.json();
    document.getElementById('progress').textContent = `Error: ${err.detail}`;
    document.getElementById('goBtn').disabled = false;
    return;
  }

  const { review_id, total } = await resp.json();
  let completed = 0;
  const evtSource = new EventSource(`/api/review/stream/${review_id}`);

  evtSource.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'heartbeat') return;

    if (data.type === 'result') {
      completed++;
      document.getElementById('progress').textContent = `${completed} / ${total} complete`;
      const safe = domId(data.model_id);
      const statusEl = document.getElementById(`status-${safe}`);
      const bodyEl = document.getElementById(`body-${safe}`);
      const metaEl = document.getElementById(`meta-${safe}`);

      if (data.status === 'complete') {
        statusEl.textContent = 'Complete';
        statusEl.className = 'result-status complete';
        bodyEl.innerHTML = marked.parse(data.text);
        metaEl.textContent = ` · ${data.tokens_out} tokens · ${(data.latency_ms / 1000).toFixed(1)}s`;
        resultData[data.model_id] = { label: data.model_label, text: data.text };
      } else {
        statusEl.textContent = 'Error';
        statusEl.className = 'result-status error';
        bodyEl.textContent = data.text;
      }
    }

    if (data.type === 'done') {
      evtSource.close();
      document.getElementById('progress').textContent = 'Review complete';
      document.getElementById('goBtn').disabled = false;
      if (Object.keys(resultData).length > 1) {
        document.getElementById('combinedBar').style.display = 'block';
      }
    }

    if (data.type === 'error') {
      evtSource.close();
      document.getElementById('progress').textContent = `Error: ${data.message}`;
      document.getElementById('goBtn').disabled = false;
    }
  };

  evtSource.onerror = () => {
    evtSource.close();
    document.getElementById('progress').textContent = 'Connection lost';
    document.getElementById('goBtn').disabled = false;
  };
}

function copyToClipboard(text, btn) {
  const orig = btn ? btn.textContent : '';
  function ok() { if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = orig, 1500); } }
  function fail() { if (btn) { btn.textContent = 'Copy failed'; setTimeout(() => btn.textContent = orig, 2000); } }

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(ok).catch(fail);
  } else {
    // Fallback for non-secure contexts (HTTP, LAN IP access)
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); ok(); }
    catch { fail(); }
    document.body.removeChild(ta);
  }
}

function copyOne(modelId) {
  const data = resultData[modelId];
  if (!data) return;
  const btn = document.querySelector(`[data-model-id="${modelId}"]`);
  copyToClipboard(`## ${data.label}\n\n${data.text}`, btn);
}

function copyCombined() {
  const parts = Object.values(resultData).map(d => `## ${d.label}\n\n${d.text}`);
  const btn = document.querySelector('.combined-bar .copy-btn');
  copyToClipboard(parts.join('\n\n---\n\n'), btn);
}
</script>
</body>
</html>
