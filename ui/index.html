<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment Platform</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Setup View (first run + settings revisit) -->
<div id="setup-view" class="hidden">
  <div class="setup-container">
    <div class="setup-header">
      <h1>Experiment Platform</h1>
      <button class="btn-secondary setup-back-btn hidden" id="setup-back-btn" onclick="hideSetup()">Back to experiments</button>
    </div>
    <p class="setup-subtitle">Configure your API keys to get started. You only need keys for the vendors you want to test.</p>

    <div id="setup-vendors"></div>

    <div class="setup-actions">
      <div id="setup-message" class="setup-message hidden"></div>
      <button class="run" id="setup-save-btn" onclick="saveSetup()">Save &amp; Continue</button>
    </div>
  </div>
</div>

<!-- Main View (three-panel layout) -->
<div id="main-view" class="hidden">
  <div class="main-header">
    <h1>Experiment Platform</h1>
    <button class="settings-btn" onclick="showSettings()" title="API Keys &amp; Settings">Settings</button>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>Experiments</h2>
      <div id="experiments-list">Loading...</div>
    </div>

    <div class="panel">
      <h2>Models</h2>
      <div class="select-hint">Click to toggle. Multiple allowed.</div>
      <div id="models-list">Loading...</div>
    </div>

    <div class="panel">
      <h2>Results</h2>
      <div id="results-list">Loading...</div>
    </div>

    <div class="controls">
      <div class="param-group">
        <label>Iterations:</label>
        <input type="number" id="iterations" min="1" max="20" value="1" oninput="updateCallCount()">
      </div>
      <div class="param-group">
        <label>Temperature:</label>
        <input type="number" id="temperature" min="0" max="2" step="0.1" value="0.7">
      </div>
      <div class="param-group">
        <label>Templates:</label>
        <select id="template-select" onchange="updateCallCount()">
          <option value="all">All</option>
        </select>
      </div>
      <div class="param-group">
        <label class="resume-label">
          <input type="checkbox" id="resume-check">
          Resume
        </label>
      </div>
      <div class="call-count hidden" id="call-count"></div>
      <button class="run" id="run-btn" disabled onclick="startRun()">Run Experiment</button>
    </div>

    <div class="runs-area hidden" id="runs-area"></div>
    <div class="log hidden" id="log"></div>
  </div>
</div>

<!-- Add Model Dialog -->
<div id="add-model-overlay" class="overlay hidden" onclick="closeAddModel(event)">
  <div class="dialog" onclick="event.stopPropagation()">
    <h2 style="text-transform:none; color:var(--text); font-size:1.1rem; margin-bottom:1rem;">Add Model</h2>
    <div class="dialog-field">
      <label>Vendor</label>
      <select id="add-model-vendor">
        <option value="">Select vendor...</option>
      </select>
      <div class="dialog-hint hidden" id="add-model-vendor-hint"></div>
    </div>
    <div class="dialog-field">
      <label>Model ID</label>
      <input type="text" id="add-model-id" placeholder="e.g. gpt-4o-mini">
    </div>
    <div class="dialog-field">
      <label>Display Label</label>
      <input type="text" id="add-model-label" placeholder="e.g. GPT-4o Mini">
    </div>
    <div id="add-model-message" class="dialog-message hidden"></div>
    <div class="dialog-actions">
      <button class="btn-secondary" onclick="closeAddModel()">Cancel</button>
      <button class="run" id="add-model-test-btn" onclick="testAndAddModel()">Test &amp; Add</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="setup.js"></script>
<script src="runners.js"></script>
<script>init();</script>
</body>
</html>
